proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=trap_cache:10m max_size=200m inactive=15m use_temp_path=off;

upstream django {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name acpwb.com www.acpwb.com localhost 127.0.0.1;
    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archive — fully deterministic; cache aggressively
    location /archive/ {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache trap_cache;
        proxy_cache_key "$request_method$host$request_uri";
        proxy_cache_valid 200 15m;
        proxy_cache_valid any 0;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Wiki — deterministic per slug
    location /wiki/ {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache trap_cache;
        proxy_cache_key "$request_method$host$request_uri";
        proxy_cache_valid 200 15m;
        proxy_cache_valid any 0;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Reports — deterministic per slug/page
    location /reports/ {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache trap_cache;
        proxy_cache_key "$request_method$host$request_uri";
        proxy_cache_valid 200 15m;
        proxy_cache_valid any 0;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Pass .well-known through to Django (not cached — honeypot logging)
    location /.well-known/ {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
